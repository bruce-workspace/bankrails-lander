<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BankRails — Product Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #07080f;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 36px;
    height: 36px;
    background: #7c3aed;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: white;
    letter-spacing: -0.5px;
  }
  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.3px;
  }
  .header-badge {
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    color: #a78bfa;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 40px 20px;
    gap: 28px;
  }

  .screen-meta {
    text-align: center;
    max-width: 600px;
  }
  .screen-number {
    font-size: 11px;
    font-weight: 600;
    color: #7c3aed;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .screen-label {
    font-size: 28px;
    font-weight: 700;
    color: white;
    margin-bottom: 10px;
    letter-spacing: -0.5px;
  }
  .screen-desc {
    font-size: 15px;
    color: #888;
    line-height: 1.6;
  }

  .viewer-wrap {
    position: relative;
    width: 100%;
    max-width: 1100px;
  }

  /* KEY FIX: aspect-ratio container, all images absolutely positioned */
  .viewer {
    position: relative;
    width: 100%;
    padding-bottom: 62.5%; /* 900/1440 = 62.5% — artboard aspect ratio */
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    background: #0d0e1a;
    cursor: pointer;
  }
  .viewer img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .viewer img.active {
    opacity: 1;
  }

  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    background: rgba(7,8,15,0.85);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    transition: background 0.2s, border-color 0.2s;
    backdrop-filter: blur(8px);
  }
  .nav-arrow:hover {
    background: rgba(124,58,237,0.3);
    border-color: rgba(124,58,237,0.5);
  }
  .nav-arrow svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: #ccc;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .nav-prev { left: -64px; }
  .nav-next { right: -64px; }
  .nav-arrow.disabled { opacity: 0.2; pointer-events: none; }

  .dots {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .dot.active {
    background: #7c3aed;
    transform: scale(1.4);
  }

  .strip {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 1100px;
    width: 100%;
  }
  .strip-item {
    flex: 0 0 auto;
    padding: 8px 16px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    font-size: 13px;
    font-weight: 500;
    color: #666;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .strip-item:hover {
    background: rgba(124,58,237,0.1);
    border-color: rgba(124,58,237,0.3);
    color: #c4b5fd;
  }
  .strip-item.active {
    background: rgba(124,58,237,0.15);
    border-color: rgba(124,58,237,0.4);
    color: #a78bfa;
    font-weight: 600;
  }

  .footer {
    text-align: center;
    padding: 16px 40px 28px;
    font-size: 12px;
    color: #444;
  }
  .footer a { color: #7c3aed; text-decoration: none; }

  .kbd-hint {
    font-size: 12px;
    color: #444;
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
  }
  .kbd {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 11px;
    color: #666;
    font-family: monospace;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">br</div>
    <span class="logo-text">BankRails</span>
  </div>
  <div class="header-badge">Product Preview · Confidential</div>
</div>

    <button class="nav-arrow nav-prev" id="prevBtn" onclick="navigate(-1)">

  <div class="dots" id="dots"></div>

  <div class="kbd-hint">
    <span class="kbd">←</span> <span class="kbd">→</span>&nbsp; arrow keys to navigate &nbsp;·&nbsp; click image to advance
  </div>

</div>

<div class="footer">
  BankRails &mdash; Agent-native payments infrastructure &nbsp;·&nbsp; <a href="https://bankrails.ai" target="_blank">bankrails.ai</a>

let current = 0;

function init() {
  const viewer = document.getElementById('viewer');
  const dots = document.getElementById('dots');
  const strip = document.getElementById('strip');

  slides.forEach((s, i) => {
    const img = document.createElement('img');
    img.src = s.img;
    img.alt = s.label;
    img.id = 'slide-' + i;
    if (i === 0) img.classList.add('active');
    viewer.appendChild(img);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goTo(i);
    dots.appendChild(dot);

    const item = document.createElement('div');
    item.className = 'strip-item' + (i === 0 ? ' active' : '');
    item.textContent = s.label;
    item.onclick = () => goTo(i);
    strip.appendChild(item);
  });

  updateUI();
}

function goTo(idx) {
  document.getElementById('slide-' + current).classList.remove('active');
  document.querySelectorAll('.dot')[current].classList.remove('active');
  document.querySelectorAll('.strip-item')[current].classList.remove('active');

  current = idx;

  document.getElementById('slide-' + current).classList.add('active');
  document.querySelectorAll('.dot')[current].classList.add('active');
  document.querySelectorAll('.strip-item')[current].classList.add('active');

  updateUI();
}

function navigate(dir) {
  const next = Math.max(0, Math.min(slides.length - 1, current + dir));
  if (next !== current) goTo(next);
}

function updateUI() {
  const s = slides[current];
  document.getElementById('screenNumber').textContent =
    String(current + 1).padStart(2, '0') + ' / ' + String(slides.length).padStart(2, '0');
  document.getElementById('screenLabel').textContent = s.label;
  document.getElementById('screenDesc').textContent = s.desc;
  document.getElementById('prevBtn').classList.toggle('disabled', current === 0);
  document.getElementById('nextBtn').classList.toggle('disabled', current === slides.length - 1);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

document.getElementById('viewer').addEventListener('click', () => navigate(1));

init();
</script>

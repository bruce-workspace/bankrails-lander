<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F0EEFF; display: flex; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; }
</style>
</head>
<body>

<!-- 400x400 purple square — primary (X, Reddit) -->
<svg id="sq" width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" rx="88" fill="#7C3AED"/>
  <text x="200" y="185" text-anchor="middle" dominant-baseline="middle"
    font-family="Space Grotesk, sans-serif" font-weight="700" font-size="248"
    letter-spacing="-12" fill="white">br</text>
  <rect x="56" y="272" width="288" height="20" rx="10" fill="white"/>
  <rect x="56" y="304" width="288" height="20" rx="10" fill="white"/>
</svg>

<!-- 400x400 white circle — alternate -->
<svg id="ci" width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <circle cx="200" cy="200" r="200" fill="white"/>
  <text x="200" y="185" text-anchor="middle" dominant-baseline="middle"
    font-family="Space Grotesk, sans-serif" font-weight="700" font-size="248"
    letter-spacing="-12" fill="#7C3AED">br</text>
  <rect x="56" y="272" width="288" height="20" rx="10" fill="#7C3AED"/>
  <rect x="56" y="304" width="288" height="20" rx="10" fill="#7C3AED"/>
</svg>

</body>
</html>

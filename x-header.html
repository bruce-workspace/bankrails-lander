<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 1500px; height: 500px; overflow: hidden; }</style>
</head>
<body>
<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B21B6"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Subtle br mark watermark far left — decorative only, will sit behind avatar -->
  <text x="160" y="260" text-anchor="middle" dominant-baseline="middle"
    font-family="Space Grotesk, sans-serif" font-weight="700" font-size="200"
    letter-spacing="-10" fill="rgba(255,255,255,0.06)">br</text>

  <!-- Main content — starts at x=420, safe from avatar -->
  <!-- Wordmark -->
  <text x="420" y="190" dominant-baseline="middle"
    font-family="Space Grotesk, sans-serif" font-weight="700" font-size="80"
    fill="white" letter-spacing="-2">bankrails</text>

  <!-- Tagline -->
  <text x="420" y="270" dominant-baseline="middle"
    font-family="Inter, sans-serif" font-weight="400" font-size="30"
    fill="rgba(255,255,255,0.65)">Payment infrastructure for AI agents</text>

  <!-- Three pills -->
  <rect x="420" y="316" width="188" height="46" rx="23" fill="rgba(255,255,255,0.12)"/>
  <text x="514" y="339" text-anchor="middle" dominant-baseline="middle"
    font-family="Inter, sans-serif" font-weight="500" font-size="17"
    fill="rgba(255,255,255,0.9)">Real ACH &amp; Wire</text>

  <rect x="622" y="316" width="182" height="46" rx="23" fill="rgba(255,255,255,0.12)"/>
  <text x="713" y="339" text-anchor="middle" dominant-baseline="middle"
    font-family="Inter, sans-serif" font-weight="500" font-size="17"
    fill="rgba(255,255,255,0.9)">Full Audit Trail</text>

  <rect x="818" y="316" width="140" height="46" rx="23" fill="rgba(255,255,255,0.12)"/>
  <text x="888" y="339" text-anchor="middle" dominant-baseline="middle"
    font-family="Inter, sans-serif" font-weight="500" font-size="17"
    fill="rgba(255,255,255,0.9)">No Crypto</text>

  <!-- URL bottom right -->
  <text x="1450" y="460" text-anchor="end" dominant-baseline="middle"
    font-family="Space Grotesk, sans-serif" font-weight="600" font-size="22"
    fill="rgba(255,255,255,0.3)">bankrails.ai</text>

</svg>
</body>
</html>

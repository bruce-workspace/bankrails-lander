<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BankRails — Payment Infrastructure for AI Agents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F5F3FF;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* ── Wordmark Top Left ── */
    .wordmark {
      position: absolute;
      top: 24px;
      left: 40px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: -0.5px;
      color: #7C3AED;
      z-index: 100;
    }
    
    /* ── Terminal Container ── */
    .terminal-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 40px 40px;
    }
    
    .terminal-iframe-wrap {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(124, 58, 237, 0.25);
    }
    
    .terminal-iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    
    /* ── Form Section ── */
    .form-section {
      padding: 40px 40px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    
    .form-wrap {
      width: 100%;
      max-width: 500px;
    }
    
    .hs-form-wrap {
      width: 100%;
    }
    
    .trust {
      font-size: 14px;
      color: #71717A;
      text-align: center;
    }
    
    .trust a {
      color: #7C3AED;
      text-decoration: none;
      font-weight: 500;
    }
    
    .trust a:hover {
      color: #6D28D9;
    }
    
    /* ── Responsive ── */
    @media (max-width: 768px) {
      .wordmark { 
        top: 20px; 
        left: 24px; 
        font-size: 20px;
      }
      
      .terminal-section { 
        padding: 80px 24px 32px; 
      }
      
      .form-section { 
        padding: 32px 24px 40px; 
      }
    }

    /* Tighten space below terminal */
    .terminal-section {
      padding-bottom: 20px !important;
    }
    
    /* Force HubSpot form inline */
    .hs-form-wrap form,
    .hs-form-wrap .hs-form,
    .hsfc-ExtraSmall {
      display: flex !important;
      flex-direction: row !important;
      align-items: stretch !important;
      gap: 0 !important;
      width: 100% !important;
    }
    
    .hs-form-wrap .hs-form-field,
    .hsfc-ExtraSmall .hs-form-field,
    .hsfc-Row {
      flex: 1 !important;
      margin: 0 !important;
    }
    
    .hs-form-wrap label,
    .hsfc-FieldLabel {
      display: none !important;
    }
    
    .hs-form-wrap input[type="email"],
    .hsfc-TextInput {
      border-right: none !important;
      border-radius: 10px 0 0 10px !important;
      height: 48px !important;
    }
    
    .hs-form-wrap .hs-submit,
    .hsfc-NavigationRow {
      flex-shrink: 0 !important;
      margin: 0 !important;
    }
    
    .hs-form-wrap .hs-button,
    .hsfc-Button {
      border-radius: 0 10px 10px 0 !important;
      height: 48px !important;
      white-space: nowrap !important;
    }
    
    /* Remove excess padding in form section */
    .form-section {
      padding-top: 20px !important;
      padding-bottom: 40px !important;
    }

    .waitlist-form {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      width: 100%;
      max-width: 460px;
    }
    .waitlist-form input[type="email"] {
      flex: 1;
      height: 50px;
      padding: 0 16px;
      font-size: 15px;
      font-family: inherit;
      border: 1.5px solid rgba(124,58,237,0.25);
      border-right: none;
      border-radius: 10px 0 0 10px;
      outline: none;
      background: white;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }
    .waitlist-form input[type="email"]:focus { border-color: #7C3AED; }
    .waitlist-form button {
      height: 50px;
      padding: 0 22px;
      background: #7C3AED;
      color: white;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 0 10px 10px 0;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .waitlist-form button:hover { background: #6D28D9; }
    .waitlist-form button:disabled { background: #A78BFA; cursor: default; }

    .hero-text {
      width: 100%;
      max-width: 900px;
      margin-bottom: 20px;
    }
    
    .trust-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .trust-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1.5px solid rgba(124,58,237,0.2);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      color: #3F3F46;
      background: white;
    }
    
    .trust-pill .check { color: #7C3AED; font-weight: 700; }
    
    .headline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 52px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -1.5px;
      color: #18181B;
    }
    
    .headline-2 {
      color: #7C3AED;
      display: block;
    }
    
    @media (max-width: 768px) {
      .headline { font-size: 36px; }
      .terminal-section { padding-top: 80px; }
    }
  </style>
</head>
<body>

  <div class="wordmark">bankrails</div>

  <div class="terminal-section">
    <div class="hero-text">
      <div class="trust-pills">
        <span class="trust-pill"><span class="check">✓</span> Real ACH &amp; wire transfers</span>
        <span class="trust-pill"><span class="check">✓</span> Full audit trail</span>
        <span class="trust-pill"><span class="check">✓</span> Reversible payments</span>
      </div>
      <h1 class="headline">Your Agents Are Ready.<br><span class="headline-2">Your Payments Aren't.</span></h1>
    </div>
    <div class="terminal-iframe-wrap">
      <iframe src="https://6933afa4-d4b1-43f3-9daa-13db3bd4ff6a-00-145mcaipx1il.janeway.replit.dev/" 
              allow="autoplay" 
              loading="lazy"
              title="BankRails Terminal Demo"></iframe>
    </div>
  </div>
  </div>

  <div class="form-section">
    <form id="waitlist-form" class="waitlist-form">
      <input type="email" id="waitlist-email" placeholder="Enter your email" required autocomplete="email">
      <button type="submit">Get Early Access</button>
    </form>
    
    <p class="trust">
      <span aria-hidden="true">🔒</span> Powered by <a href="https://www.getbankshot.com" target="_blank" rel="noopener noreferrer">Bank Shot</a>
    </p>
  </div>

  
  <script>
    
  </script>


  

  <script>
    document.getElementById('waitlist-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = this.querySelector('button');
      const email = document.getElementById('waitlist-email').value;
      btn.disabled = true;
      btn.textContent = 'Submitting...';
      try {
        const res = await fetch('https://api.hsforms.com/submissions/v3/integration/submit/50799094/63247df3-fd8f-4fdd-b8cf-991d56bcdab6', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields: [{ name: 'email', value: email }], context: { pageUri: window.location.href } })
        });
        if (res.ok) {
          this.innerHTML = '<p style="color:#7C3AED;font-weight:600;font-size:16px;">✓ You\'re on the list!</p>';
        } else {
          btn.disabled = false; btn.textContent = 'Get Early Access';
        }
      } catch(err) {
        btn.disabled = false; btn.textContent = 'Get Early Access';
      }
    });
  </script>
</body>
</html>

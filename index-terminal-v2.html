<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BankRails — Payment Infrastructure for AI Agents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F5F3FF;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* ── Wordmark Top Left ── */
    .wordmark {
      position: absolute;
      top: 24px;
      left: 40px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: -0.5px;
      color: #7C3AED;
      z-index: 100;
    }
    
    /* ── Terminal Container ── */
    .terminal-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 40px 40px;
    }
    
    .terminal-iframe-wrap {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(124, 58, 237, 0.25);
    }
    
    .terminal-iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    
    /* ── Form Section ── */
    .form-section {
      padding: 40px 40px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    
    .form-wrap {
      width: 100%;
      max-width: 500px;
    }
    
    .hs-form-wrap {
      width: 100%;
    }
    
    .trust {
      font-size: 14px;
      color: #71717A;
      text-align: center;
    }
    
    .trust a {
      color: #7C3AED;
      text-decoration: none;
      font-weight: 500;
    }
    
    .trust a:hover {
      color: #6D28D9;
    }
    
    /* ── Responsive ── */
    @media (max-width: 768px) {
      .wordmark { 
        top: 20px; 
        left: 24px; 
        font-size: 20px;
      }
      
      .terminal-section { 
        padding: 80px 24px 32px; 
      }
      
      .form-section { 
        padding: 32px 24px 40px; 
      }
    }

    /* Tighten space below terminal */
    .terminal-section {
      padding-bottom: 20px !important;
    }
    
    /* Force HubSpot form inline */
    .hs-form-wrap form,
    .hs-form-wrap .hs-form,
    .hsfc-ExtraSmall {
      display: flex !important;
      flex-direction: row !important;
      align-items: stretch !important;
      gap: 0 !important;
      width: 100% !important;
    }
    
    .hs-form-wrap .hs-form-field,
    .hsfc-ExtraSmall .hs-form-field,
    .hsfc-Row {
      flex: 1 !important;
      margin: 0 !important;
    }
    
    .hs-form-wrap label,
    .hsfc-FieldLabel {
      display: none !important;
    }
    
    .hs-form-wrap input[type="email"],
    .hsfc-TextInput {
      border-right: none !important;
      border-radius: 10px 0 0 10px !important;
      height: 48px !important;
    }
    
    .hs-form-wrap .hs-submit,
    .hsfc-NavigationRow {
      flex-shrink: 0 !important;
      margin: 0 !important;
    }
    
    .hs-form-wrap .hs-button,
    .hsfc-Button {
      border-radius: 0 10px 10px 0 !important;
      height: 48px !important;
      white-space: nowrap !important;
    }
    
    /* Remove excess padding in form section */
    .form-section {
      padding-top: 20px !important;
      padding-bottom: 40px !important;
    }
  </style>
</head>
<body>

  <div class="wordmark">bankrails</div>

  <div class="terminal-section">
    <div class="terminal-iframe-wrap">
      <iframe src="https://6933afa4-d4b1-43f3-9daa-13db3bd4ff6a-00-145mcaipx1il.janeway.replit.dev/" 
              allow="autoplay" 
              loading="lazy"
              title="BankRails Terminal Demo"></iframe>
    </div>
  </div>

  <div class="form-section">
    <div class="form-wrap">
      <div class="hs-form-wrap">
        <div class="hs-form-html" 
             data-region="na1"
             data-form-id="63247df3-fd8f-4fdd-b8cf-991d56bcdab6"
             data-portal-id="50799094"></div>
      </div>
    </div>
    
    <p class="trust">
      <span aria-hidden="true">🔒</span> Powered by <a href="https://www.getbankshot.com" target="_blank" rel="noopener noreferrer">Bank Shot</a>
    </p>
  </div>

  <script charset="utf-8" type="text/javascript" src="//js-na1.hsforms.net/forms/embed/v2.js"></script>
  <script>
    hbspt.forms.create({
      region: "na1",
      portalId: "50799094",
      formId: "63247df3-fd8f-4fdd-b8cf-991d56bcdab6",
      target: ".hs-form-html"
    });
  </script>


  <script>
    function styleHsForm() {
      const content = document.querySelector('.hsfc-Step__Content');
      if (!content) return false;

      content.style.setProperty('display', 'flex', 'important');
      content.style.setProperty('flex-direction', 'row', 'important');
      content.style.setProperty('flex-wrap', 'nowrap', 'important');
      content.style.setProperty('align-items', 'stretch', 'important');
      content.style.setProperty('width', '100%', 'important');
      content.style.setProperty('gap', '0', 'important');

      const row = content.querySelector('.hsfc-Row');
      if (row) { row.style.setProperty('flex', '1 1 auto', 'important'); row.style.setProperty('margin', '0', 'important'); }

      content.querySelectorAll('.hsfc-FieldLabel').forEach(el => el.style.setProperty('display', 'none', 'important'));

      const input = content.querySelector('.hsfc-TextInput');
      if (input) {
        input.style.setProperty('border-radius', '10px 0 0 10px', 'important');
        input.style.setProperty('border-right', 'none', 'important');
        input.style.setProperty('height', '50px', 'important');
        input.style.setProperty('width', '100%', 'important');
      }

      const navRow = content.querySelector('.hsfc-NavigationRow');
      if (navRow) { navRow.style.setProperty('flex-shrink', '0', 'important'); navRow.style.setProperty('margin', '0', 'important'); }

      const btn = content.querySelector('.hsfc-Button');
      if (btn) {
        btn.style.setProperty('border-radius', '0 10px 10px 0', 'important');
        btn.style.setProperty('height', '50px', 'important');
        btn.style.setProperty('white-space', 'nowrap', 'important');
        btn.style.setProperty('padding', '0 24px', 'important');
      }

      return true;
    }

    if (!styleHsForm()) {
      const observer = new MutationObserver(() => {
        if (styleHsForm()) { observer.disconnect(); window.addEventListener('resize', styleHsForm); }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    } else {
      window.addEventListener('resize', styleHsForm);
    }
  </script>
</body>
</html>

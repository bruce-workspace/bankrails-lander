<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=Inter:wght@700;800;900&family=DM+Sans:wght@700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F0EEFF; font-family: Inter, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 60px 40px; }
  .page { display: flex; flex-direction: column; gap: 56px; max-width: 960px; width: 100%; }
  .row-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #7C3AED; border-bottom: 1px solid rgba(124,58,237,0.15); padding-bottom: 10px; margin-bottom: 24px; }
  .row { display: flex; align-items: flex-end; gap: 32px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .sz-label { font-size: 9px; color: #a0a0b0; font-weight: 500; letter-spacing: 0.05em; text-align: center; }
  .circle-lg { width: 120px; height: 120px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 24px rgba(124,58,237,0.13); overflow: hidden; }
  .sq-lg    { width: 120px; height: 120px; border-radius: 22px; background: #7C3AED; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 24px rgba(124,58,237,0.3); overflow: hidden; }
</style>
</head>
<body>
<div class="page">

  <!-- WINNER: Lowercase br, slightly larger -->
  <div>
    <div class="row-label">✦ Lowercase br — scaled up (close to final)</div>
    <div class="row">
      <div class="item">
        <div class="circle-lg">
          <svg viewBox="0 0 100 100" width="100" height="100">
            <text x="50" y="44" text-anchor="middle" dominant-baseline="middle"
              font-family="Space Grotesk, sans-serif" font-weight="700" font-size="62"
              letter-spacing="-3" fill="#7C3AED">br</text>
            <rect x="14" y="68" width="72" height="5" rx="2.5" fill="#7C3AED"/>
            <rect x="14" y="76" width="72" height="5" rx="2.5" fill="#7C3AED"/>
          </svg>
        </div>
        <div class="sz-label">Space Grotesk<br>Purple on white</div>
      </div>
      <div class="item">
        <div class="sq-lg">
          <svg viewBox="0 0 100 100" width="100" height="100">
            <text x="50" y="44" text-anchor="middle" dominant-baseline="middle"
              font-family="Space Grotesk, sans-serif" font-weight="700" font-size="62"
              letter-spacing="-3" fill="white">br</text>
            <rect x="14" y="68" width="72" height="5" rx="2.5" fill="white"/>
            <rect x="14" y="76" width="72" height="5" rx="2.5" fill="white"/>
          </svg>
        </div>
        <div class="sz-label">Space Grotesk<br>White on purple</div>
      </div>
    </div>
  </div>

  <!-- Uppercase BR alternatives — different type treatments -->
  <div>
    <div class="row-label">Uppercase BR — alternate type treatments</div>
    <div class="row">

      <!-- Inter 900 — wide, no tight kern -->
      <div class="item">
        <div class="sq-lg">
          <svg viewBox="0 0 100 100" width="100" height="100">
            <text x="50" y="46" text-anchor="middle" dominant-baseline="middle"
              font-family="Inter, sans-serif" font-weight="900" font-size="46"
              letter-spacing="0" fill="white">BR</text>
            <rect x="16" y="68" width="68" height="4.5" rx="2.25" fill="white"/>
            <rect x="16" y="75.5" width="68" height="4.5" rx="2.25" fill="white"/>
          </svg>
        </div>
        <div class="sz-label">Inter 900<br>Natural kern</div>
      </div>

      <!-- Syne — geometric, distinctive -->
      <div class="item">
        <div class="sq-lg">
          <svg viewBox="0 0 100 100" width="100" height="100">
            <text x="50" y="46" text-anchor="middle" dominant-baseline="middle"
              font-family="Syne, sans-serif" font-weight="800" font-size="48"
              letter-spacing="-1" fill="white">BR</text>
            <rect x="16" y="68" width="68" height="4.5" rx="2.25" fill="white"/>
            <rect x="16" y="76" width="68" height="4.5" rx="2.25" fill="white"/>
          </svg>
        </div>
        <div class="sz-label">Syne 800<br>Geometric</div>
      </div>

      <!-- DM Sans — rounder, warmer -->
      <div class="item">
        <div class="sq-lg">
          <svg viewBox="0 0 100 100" width="100" height="100">
            <text x="50" y="46" text-anchor="middle" dominant-baseline="middle"
              font-family="DM Sans, sans-serif" font-weight="800" font-size="50"
              letter-spacing="-2" fill="white">BR</text>
            <rect x="16" y="68" width="68" height="4.5" rx="2.25" fill="white"/>
            <rect x="16" y="76" width="68" height="4.5" rx="2.25" fill="white"/>
          </svg>
        </div>
        <div class="sz-label">DM Sans 800<br>Rounder</div>
      </div>

      <!-- Space Grotesk wider spacing — fixes the cramped feel -->
      <div class="item">
        <div class="sq-lg">
          <svg viewBox="0 0 100 100" width="100" height="100">
            <text x="50" y="46" text-anchor="middle" dominant-baseline="middle"
              font-family="Space Grotesk, sans-serif" font-weight="700" font-size="44"
              letter-spacing="3" fill="white">BR</text>
            <rect x="12" y="68" width="76" height="4.5" rx="2.25" fill="white"/>
            <rect x="12" y="76" width="76" height="4.5" rx="2.25" fill="white"/>
          </svg>
        </div>
        <div class="sz-label">Space Grotesk<br>Open tracking</div>
      </div>

      <!-- White on white circles — same 4 -->
    </div>

    <!-- Same 4 on white circles -->
    <div style="margin-top:20px">
    <div class="row">
      <div class="item">
        <div class="circle-lg">
          <svg viewBox="0 0 100 100" width="100" height="100">
            <text x="50" y="46" text-anchor="middle" dominant-baseline="middle"
              font-family="Inter, sans-serif" font-weight="900" font-size="46"
              letter-spacing="0" fill="#7C3AED">BR</text>
            <rect x="16" y="68" width="68" height="4.5" rx="2.25" fill="#7C3AED"/>
            <rect x="16" y="75.5" width="68" height="4.5" rx="2.25" fill="#7C3AED"/>
          </svg>
        </div>
        <div class="sz-label">Inter 900</div>
      </div>
      <div class="item">
        <div class="circle-lg">
          <svg viewBox="0 0 100 100" width="100" height="100">
            <text x="50" y="46" text-anchor="middle" dominant-baseline="middle"
              font-family="Syne, sans-serif" font-weight="800" font-size="48"
              letter-spacing="-1" fill="#7C3AED">BR</text>
            <rect x="16" y="68" width="68" height="4.5" rx="2.25" fill="#7C3AED"/>
            <rect x="16" y="76" width="68" height="4.5" rx="2.25" fill="#7C3AED"/>
          </svg>
        </div>
        <div class="sz-label">Syne 800</div>
      </div>
      <div class="item">
        <div class="circle-lg">
          <svg viewBox="0 0 100 100" width="100" height="100">
            <text x="50" y="46" text-anchor="middle" dominant-baseline="middle"
              font-family="DM Sans, sans-serif" font-weight="800" font-size="50"
              letter-spacing="-2" fill="#7C3AED">BR</text>
            <rect x="16" y="68" width="68" height="4.5" rx="2.25" fill="#7C3AED"/>
            <rect x="16" y="76" width="68" height="4.5" rx="2.25" fill="#7C3AED"/>
          </svg>
        </div>
        <div class="sz-label">DM Sans 800</div>
      </div>
      <div class="item">
        <div class="circle-lg">
          <svg viewBox="0 0 100 100" width="100" height="100">
            <text x="50" y="46" text-anchor="middle" dominant-baseline="middle"
              font-family="Space Grotesk, sans-serif" font-weight="700" font-size="44"
              letter-spacing="3" fill="#7C3AED">BR</text>
            <rect x="12" y="68" width="76" height="4.5" rx="2.25" fill="#7C3AED"/>
            <rect x="12" y="76" width="76" height="4.5" rx="2.25" fill="#7C3AED"/>
          </svg>
        </div>
        <div class="sz-label">Open tracking</div>
      </div>
    </div>
    </div>
  </div>

</div>
</body>
</html>

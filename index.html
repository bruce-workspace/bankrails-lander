<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BankRails — The Payment Layer for AI Agents</title>

  <!-- Open Graph -->
  <meta property="og:title" content="BankRails — The Payment Layer for AI Agents" />
  <meta property="og:description" content="Your Agents Are Ready.<br>Your Payments Aren't. Join the waitlist." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bankrails.ai" />
  <meta property="og:image" content="https://bankrails.ai/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="BankRails — The Payment Layer for AI Agents" />
  <meta name="twitter:description" content="Your Agents Are Ready.<br>Your Payments Aren't. Join the waitlist." />
  <meta name="twitter:image" content="https://bankrails.ai/og-image.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet" />
  <script src="https://js.hsforms.net/forms/embed/developer/50799094.js" defer></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background-color: #F5F3FF;
      color: #18181B;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
      position: relative;
    }

    /* Radial purple glow */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(124,58,237,0.12) 0%, rgba(124,58,237,0.04) 50%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Nav bar ── */
    .nav {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      padding: 22px 36px;
      width: 100%;
    }

    /* ── Hero (fills remaining viewport) ── */
    .hero {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 48px 48px;
    }

    .hero-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 56px;
      width: 100%;
      max-width: 1100px;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
      gap: 24px;
      max-width: 520px;
      flex: 1;
    }

    /* ── Phone frame ── */
    .phone-wrap {
      flex-shrink: 0;
      position: relative;
      width: 240px;
      display: flex;
      align-items: center;
    }

    /* Outer shell — iPhone proportions ~9:19.5 */
    .phone-shell {
      position: relative;
      width: 240px;
      height: 500px;
      border-radius: 44px;
      background: linear-gradient(145deg, #2a1060 0%, #120830 60%, #0a0018 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),
        0 50px 120px rgba(124,58,237,0.5),
        0 20px 40px rgba(0,0,0,0.4);
      transform: rotate(-4deg);
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
    }

    /* Dynamic island */
    .phone-island {
      width: 80px;
      height: 26px;
      background: #000;
      border-radius: 20px;
      margin: 0 auto 8px;
      flex-shrink: 0;
    }

    /* Screen area */
    .phone-screen {
      flex: 1;
      border-radius: 28px;
      overflow: hidden;
      background: #000;
      position: relative;
    }

    .phone-screen video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 28px;
    }

    /* Dissolve right + bottom edges into page */
    .phone-fade {
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background:
        linear-gradient(to left,  #F5F3FF 0%, transparent 50%),
        linear-gradient(to bottom, rgba(245,243,255,0.6) 0%, transparent 30%);
      pointer-events: none;
    }

    /* Ambient glow — large, soft */
    .phone-glow {
      position: absolute;
      inset: -100px -140px;
      background: radial-gradient(ellipse at 55% 50%, rgba(124,58,237,0.3) 0%, rgba(124,58,237,0.1) 40%, transparent 70%);
      z-index: -1;
      pointer-events: none;
    }

    /* Side buttons */
    .phone-btn-right {
      position: absolute;
      right: -3px;
      top: 120px;
      width: 3px;
      height: 60px;
      background: #1a0a3a;
      border-radius: 0 2px 2px 0;
    }
    .phone-btn-left-1 {
      position: absolute;
      left: -3px;
      top: 100px;
      width: 3px;
      height: 30px;
      background: #1a0a3a;
      border-radius: 2px 0 0 2px;
    }
    .phone-btn-left-2 {
      position: absolute;
      left: -3px;
      top: 145px;
      width: 3px;
      height: 50px;
      background: #1a0a3a;
      border-radius: 2px 0 0 2px;
    }

    /* ── Wordmark ── */
    .wordmark-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      color: #18181B;
      line-height: 1;
    }

    /* Two thin rail lines below the wordmark */
    .rail-lines {
      display: block;
      width: 100%;
      height: 8px;
      margin-top: 5px;
      position: relative;
    }
    .rail-lines::before,
    .rail-lines::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: rgba(124, 58, 237, 0.60);
    }
    .rail-lines::before { top: 0; }
    .rail-lines::after  { top: 4px; }

    /* ── Headline ── */
    .headline {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(1.9rem, 5vw, 3.8rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: #18181B;
    }

    /* ── Subhead ── */
    .subhead {
      font-size: 1.1rem;
      line-height: 1.65;
      color: #71717A;
      max-width: 480px;
    }

    /* ── Form ── */
    .form {
      display: flex;
      width: 100%;
      max-width: 480px;
    }

    .email-input {
      flex: 1;
      background: #FFFFFF;
      border: 1px solid rgba(124,58,237,0.25);
      border-right: none;
      border-radius: 10px 0 0 10px;
      padding: 14px 18px;
      color: #18181B;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .email-input::placeholder { color: #71717A; }
    .email-input:focus {
      border-color: rgba(124,58,237,0.55);
      background: rgba(124,58,237,0.06);
    }

    .submit-btn {
      flex-shrink: 0;
      background: #7C3AED;
      color: #fff;
      border: none;
      border-radius: 0 10px 10px 0;
      padding: 14px 22px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .submit-btn:hover {
      background: #6D28D9;
      box-shadow: 0 0 20px rgba(124,58,237,0.35);
    }
    .submit-btn:active { background: #5B21B6; }

    /* Success state */
    .success-msg {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: #10B981;
      padding: 14px 0;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 1.15rem;
      line-height: 1.6;
      color: #52525B;
      max-width: 480px;
      text-align: left;
    }

    /* ── Trust pills row ── */
    .trust-pills {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .trust-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(124,58,237,0.15);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 0.78rem;
      font-weight: 500;
      color: #52525B;
    }
    .trust-pill-check {
      color: #7C3AED;
      font-weight: 700;
    }

    /* ── No-crypto pill ── */
    .no-crypto-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.20);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #6D28D9;
      letter-spacing: 0.01em;
    }

    /* ── Trust badge ── */
    .trust {
      font-size: 0.8rem;
      color: #71717A;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .trust a {
      color: #71717A;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.2s;
    }
    .trust a:hover { color: #A1A1AA; }

    /* ── HubSpot developer-embed overrides (hsfc-* classes) ── */
    .hs-form-wrap {
      width: 100%;
      max-width: 480px;
    }
    /* Outer form: block is fine, we control layout inside */
    .hs-form-wrap form { width: 100% !important; }

    /* Step content: flex row so field + button sit inline */
    .hs-form-wrap .hsfc-Step__Content {
      display: flex !important;
      flex-wrap: nowrap !important;
      align-items: stretch !important;
      width: 100% !important;
      gap: 0 !important;
    }
    /* Field row takes remaining space */
    .hs-form-wrap .hsfc-Row {
      flex: 1 1 auto !important;
      min-width: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    /* Email field wrapper */
    .hs-form-wrap .hsfc-EmailField {
      width: 100% !important;
      margin: 0 !important;
    }
    /* Hide label */
    .hs-form-wrap .hsfc-FieldLabel { display: none !important; }
    /* Input */
    .hs-form-wrap .hsfc-TextInput {
      width: 100% !important;
      height: 100% !important;
      min-height: 50px !important;
      background: #FFFFFF !important;
      border: 1px solid rgba(124,58,237,0.25) !important;
      border-right: none !important;
      border-radius: 10px 0 0 10px !important;
      padding: 14px 18px !important;
      color: #18181B !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 0.95rem !important;
      outline: none !important;
      box-shadow: none !important;
      -webkit-appearance: none !important;
    }
    .hs-form-wrap .hsfc-TextInput:focus {
      border-color: rgba(124,58,237,0.55) !important;
      background: rgba(124,58,237,0.06) !important;
    }
    /* Navigation row (submit) sits at end */
    .hs-form-wrap .hsfc-NavigationRow {
      flex-shrink: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      display: flex !important;
      align-items: stretch !important;
    }
    .hs-form-wrap .hsfc-NavigationRow__Alerts { display: none !important; }
    .hs-form-wrap .hsfc-NavigationRow__Buttons {
      display: flex !important;
      align-items: stretch !important;
    }
    /* Submit button */
    .hs-form-wrap .hsfc-Button {
      display: flex !important;
      align-items: center !important;
      background: #7C3AED !important;
      color: #fff !important;
      border: none !important;
      border-radius: 0 10px 10px 0 !important;
      padding: 14px 22px !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 0.95rem !important;
      font-weight: 500 !important;
      cursor: pointer !important;
      white-space: nowrap !important;
      transition: background 0.2s, box-shadow 0.2s !important;
      -webkit-appearance: none !important;
      height: auto !important;
    }
    .hs-form-wrap .hsfc-Button:hover {
      background: #6D28D9 !important;
      box-shadow: 0 0 20px rgba(124,58,237,0.35) !important;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .hero-inner { flex-direction: column; gap: 40px; align-items: center; }
      .page { align-items: center; text-align: center; max-width: 100%; }
      .tagline { text-align: center; }
      .trust-pills { justify-content: center; }
      .phone-wrap { width: 180px; }
      .phone-shell { width: 180px; height: 375px; border-radius: 36px; }
      .phone-fade { display: none; }
    }
    @media (max-width: 520px) {
      .nav { padding: 16px 20px; }
      .hero { padding: 0 20px 40px; align-items: flex-start; padding-top: 32px; }
      .hero-inner { flex-direction: column; }
      .phone-wrap { display: none; }
      .page { gap: 20px; text-align: left; align-items: flex-start; }
      .wordmark { font-size: 1.1rem; }
      .tagline { font-size: 1rem; text-align: left; }
      .trust-pills { justify-content: flex-start; }
      .trust { text-align: left; }
      .hs-form-wrap .hsfc-Step__Content {
        flex-direction: column !important;
        gap: 10px !important;
      }
      .hs-form-wrap .hsfc-TextInput {
        border-right: 1px solid rgba(124,58,237,0.25) !important;
        border-radius: 10px !important;
      }
      .hs-form-wrap .hsfc-NavigationRow { width: 100% !important; }
      .hs-form-wrap .hsfc-NavigationRow__Buttons { width: 100% !important; }
      .hs-form-wrap .hsfc-Button {
        border-radius: 10px !important;
        width: 100% !important;
        padding: 14px !important;
        justify-content: center !important;
      }
    }
  </style>
</head>
<body>

  <!-- Nav bar -->
  <nav class="nav">
    <div class="wordmark-wrap">
      <span class="wordmark">bankrails</span>
      <span class="rail-lines" aria-hidden="true"></span>
    </div>
  </nav>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-inner">

      <!-- Left: copy -->
      <main class="page">

        <!-- Headline -->
        <h1 class="headline">Your Agents Are Ready. Your Payments Aren't.</h1>

        <!-- Tagline -->
        <p class="tagline">No wallets. No gas fees. No rug pulls. Just payments that actually work.</p>

        <!-- Waitlist form (HubSpot) -->
        <div class="hs-form-wrap">
          <div class="hs-form-html" data-region="na1"
            data-form-id="63247df3-fd8f-4fdd-b8cf-991d56bcdab6"
            data-portal-id="50799094"></div>
        </div>

        <!-- Trust pills -->
        <div class="trust-pills">
          <span class="trust-pill"><span class="trust-pill-check">✓</span> Real ACH &amp; wire transfers</span>
          <span class="trust-pill"><span class="trust-pill-check">✓</span> Full audit trail</span>
          <span class="trust-pill"><span class="trust-pill-check">✓</span> Reversible payments</span>
        </div>

        <!-- Trust badge -->
        <p class="trust">
          <span aria-hidden="true">🔒</span>
          Powered by <a href="https://www.getbankshot.com" target="_blank" rel="noopener noreferrer">Bank Shot</a>
        </p>

      </main>

      <!-- Right: iPhone mockup with AI video -->
      <div class="phone-wrap">
        <div class="phone-glow"></div>
        <div class="phone-shell">
          <div class="phone-island"></div>
          <div class="phone-screen">
            <video
              src="bankrails-video-test.mp4"
              autoplay
              loop
              muted
              playsinline
              preload="auto"
            ></video>
            <div class="phone-fade"></div>
          </div>
          <div class="phone-btn-right"></div>
          <div class="phone-btn-left-1"></div>
          <div class="phone-btn-left-2"></div>
        </div>
      </div>

    </div>
  </div>



  <script>
    // Force inline layout after HubSpot developer-embed renders (uses hsfc-* classes)
    function styleHsForm() {
      const content = document.querySelector('.hs-form-wrap .hsfc-Step__Content');
      if (!content) return false;

      const isMobile = window.innerWidth <= 520;

      // Step content: flex row (or column on mobile)
      content.style.setProperty('display', 'flex', 'important');
      content.style.setProperty('flex-wrap', 'nowrap', 'important');
      content.style.setProperty('align-items', 'stretch', 'important');
      content.style.setProperty('width', '100%', 'important');
      content.style.setProperty('gap', isMobile ? '10px' : '0', 'important');
      content.style.setProperty('flex-direction', isMobile ? 'column' : 'row', 'important');

      // Field row
      const row = content.querySelector('.hsfc-Row');
      if (row) { row.style.setProperty('flex', '1 1 auto', 'important'); row.style.setProperty('margin', '0', 'important'); }

      // Label: hide
      content.querySelectorAll('.hsfc-FieldLabel').forEach(el => el.style.setProperty('display', 'none', 'important'));

      // Input
      const input = content.querySelector('.hsfc-TextInput');
      if (input) {
        input.style.setProperty('width', '100%', 'important');
        input.style.setProperty('min-height', '50px', 'important');
        input.style.setProperty('background', '#FFFFFF', 'important');
        input.style.setProperty('border', '1px solid rgba(124,58,237,0.25)', 'important');
        input.style.setProperty('border-right', isMobile ? '1px solid rgba(124,58,237,0.25)' : 'none', 'important');
        input.style.setProperty('border-radius', isMobile ? '10px' : '10px 0 0 10px', 'important');
        input.style.setProperty('padding', '14px 18px', 'important');
        input.style.setProperty('color', '#18181B', 'important');
        input.style.setProperty('font-family', "'Inter', sans-serif", 'important');
        input.style.setProperty('font-size', '0.95rem', 'important');
        input.style.setProperty('box-shadow', 'none', 'important');
        input.style.setProperty('-webkit-appearance', 'none', 'important');
      }

      // Nav row — must be width:auto so it doesn't swallow all flex space
      const nav = content.querySelector('.hsfc-NavigationRow');
      if (nav) {
        nav.style.setProperty('flex-shrink', '0', 'important');
        nav.style.setProperty('flex-grow', '0', 'important');
        nav.style.setProperty('width', isMobile ? '100%' : 'auto', 'important');
        nav.style.setProperty('margin', '0', 'important');
        nav.style.setProperty('display', 'flex', 'important');
        nav.style.setProperty('align-items', 'stretch', 'important');
      }

      // Alerts: hide
      const alerts = content.querySelector('.hsfc-NavigationRow__Alerts');
      if (alerts) alerts.style.setProperty('display', 'none', 'important');

      const btns = content.querySelector('.hsfc-NavigationRow__Buttons');
      if (btns) {
        btns.style.setProperty('display', 'flex', 'important');
        btns.style.setProperty('align-items', 'stretch', 'important');
        if (isMobile) btns.style.setProperty('width', '100%', 'important');
      }

      // Button
      const btn = content.querySelector('.hsfc-Button');
      if (btn) {
        btn.style.setProperty('display', 'flex', 'important');
        btn.style.setProperty('align-items', 'center', 'important');
        btn.style.setProperty('justify-content', 'center', 'important');
        btn.style.setProperty('background', '#7C3AED', 'important');
        btn.style.setProperty('color', '#fff', 'important');
        btn.style.setProperty('border', 'none', 'important');
        btn.style.setProperty('border-radius', isMobile ? '10px' : '0 10px 10px 0', 'important');
        btn.style.setProperty('padding', '14px 22px', 'important');
        btn.style.setProperty('font-family', "'Inter', sans-serif", 'important');
        btn.style.setProperty('font-size', '0.95rem', 'important');
        btn.style.setProperty('font-weight', '500', 'important');
        btn.style.setProperty('cursor', 'pointer', 'important');
        btn.style.setProperty('white-space', 'nowrap', 'important');
        if (isMobile) btn.style.setProperty('width', '100%', 'important');
      }

      return true;
    }

    // Poll until HubSpot renders, then apply + watch resize
    const timer = setInterval(() => {
      if (styleHsForm()) {
        clearInterval(timer);
        window.addEventListener('resize', styleHsForm);
      }
    }, 100);
    setTimeout(() => clearInterval(timer), 10000); // give up after 10s
  </script>
</body>
</html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background-color: #FAFAFA;
      color: #18181B;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
      position: relative;
    }

    /* Right-edge fade overlay on hero — makes video bleed look intentional */
    .hero::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 120px;
      background: linear-gradient(to right, transparent, #F5F3FF);
      z-index: 10;
      pointer-events: none;
    }

    /* Radial purple glow */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(124,58,237,0.06) 0%, rgba(124,58,237,0.02) 50%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Nav bar ── */
    .nav {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      padding: 22px 36px;
      width: 100%;
    }

    /* ── Hero (fills remaining viewport) ── */
    .hero {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 48px 48px;
      overflow: hidden;
    }

    .hero-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      width: 100%;
      max-width: 960px;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
      gap: 32px;
      max-width: 520px;
      flex: 1;
    }

    /* ── Phone frame ── */
    .phone-wrap {
      flex-shrink: 0;
      position: relative;
      width: 240px;
      display: flex;
      align-items: center;
    }

    /* Outer shell — modern iPhone: screen flush to edges */
    .phone-shell {
      position: relative;
      width: 240px;
      height: 500px;
      border-radius: 44px;
      background: #0a0018;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.1),
        inset 0 0 0 8px #1a0840,
        0 50px 120px rgba(124,58,237,0.5),
        0 20px 40px rgba(0,0,0,0.4);
      transform: rotate(-4deg);
      padding: 0;
      overflow: hidden;
    }

    /* Dynamic island — floats over video */
    .phone-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 26px;
      background: #000;
      border-radius: 20px;
      z-index: 2;
    }

    /* Screen area — fills full shell */
    .phone-screen {
      position: absolute;
      inset: 0;
      border-radius: 36px;
      overflow: hidden;
      background: #000;
    }

    .phone-screen video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #0a0018;
    }

    /* Vignette: top + bottom of screen fade to dark — terminal floats */
    .screen-vignette {
      position: absolute;
      inset: 0;
      border-radius: 36px;
      background:
        linear-gradient(to bottom, #0a0018 0%, transparent 28%),
        linear-gradient(to top,    #0a0018 0%, transparent 28%);
      pointer-events: none;
      z-index: 1;
    }

    /* Dissolve right + bottom edges into page — disabled */
    .phone-fade { display: none;
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background:
        linear-gradient(to left,  #F5F3FF 0%, transparent 50%),
        linear-gradient(to bottom, rgba(245,243,255,0.6) 0%, transparent 30%);
      pointer-events: none;
    }

    /* Ambient glow — large, soft */
    .phone-glow {
      position: absolute;
      inset: -100px -140px;
      background: radial-gradient(ellipse at 55% 50%, rgba(124,58,237,0.15) 0%, rgba(124,58,237,0.05) 40%, transparent 65%);
      z-index: -1;
      pointer-events: none;
    }

    /* Side buttons */
    .phone-btn-right {
      position: absolute;
      right: -3px;
      top: 120px;
      width: 3px;
      height: 60px;
      background: #1a0a3a;
      border-radius: 0 2px 2px 0;
    }
    .phone-btn-left-1 {

      left: -3px;
      top: 100px;
      width: 3px;
      height: 30px;
      background: #1a0a3a;

    }
    .phone-btn-left-2 {

      left: -3px;

      width: 3px;
      height: 50px;
      background: #1a0a3a;
      border-radius: 2px 0 0 2px;
    }

    /* ── Wordmark ── */
    .wordmark-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      color: #18181B;
      line-height: 1;
    }

    /* Two thin rail lines below the wordmark */
    .rail-lines {
      display: block;
      width: 100%;
      height: 8px;
      margin-top: 5px;
      position: relative;
    }
    .rail-lines::before,
    .rail-lines::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: rgba(124, 58, 237, 0.60);
    }
    .rail-lines::before { top: 0; }
    .rail-lines::after  { top: 4px; }

    /* ── Headline ── */
    .headline {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(1.9rem, 5vw, 3.8rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: #18181B;

      color: #7C3AED;

    /* ── Form ── */
    .form {

    .email-input {
      flex: 1;
      background: #FFFFFF;

    }
    .email-input::placeholder { color: #71717A; }
    .email-input:focus {
      border-color: rgba(124,58,237,0.55);
      background: rgba(124,58,237,0.06);
    }

    .submit-btn {
      flex-shrink: 0;
      background: #7C3AED;
      color: #fff;
      border: none;
      border-radius: 0 10px 10px 0;
      padding: 14px 22px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .submit-btn:hover {
      background: #6D28D9;
      box-shadow: 0 0 20px rgba(124,58,237,0.35);
    }
    .submit-btn:active { background: #5B21B6; }

    /* Success state */
    .success-msg {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: #10B981;
      padding: 14px 0;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 1.15rem;
      line-height: 1.6;
      color: #52525B;
      max-width: 480px;
      text-align: left;
    }

      background: rgba(255,255,255,0.7);

      font-size: 0.78rem;
      font-weight: 500;
      color: #52525B;

    .trust-pill-check {

      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #6D28D9;

    /* ── Trust badge ── */
    .trust {
      font-size: 0.85rem;
      color: #52525B;
      display: flex;
      align-items: center;
      gap: 6px;
      align-self: flex-start;

    }
    .trust a {

  <script>
    document.getElementById('waitlist-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = this.querySelector('button');
      const email = document.getElementById('waitlist-email').value;
      btn.disabled = true;
      btn.textContent = 'Submitting...';
      try {
        const res = await fetch('https://api.hsforms.com/submissions/v3/integration/submit/50799094/63247df3-fd8f-4fdd-b8cf-991d56bcdab6', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fields: [{ name: 'email', value: email }],
            context: { pageUri: window.location.href, pageName: 'BankRails Waitlist' }
          })
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          this.innerHTML = '<p style="color:#7C3AED;font-weight:600;font-size:16px;">✓ You\'re on the list!</p>';
        } else {
          console.error('HubSpot submission error:', res.status, data);
          btn.disabled = false; btn.textContent = 'Get Early Access';
          // Show error details in console for debugging
        }
      } catch(err) {
        console.error('HubSpot fetch error:', err);
        btn.disabled = false; btn.textContent = 'Get Early Access';
      }
    });
  </script>

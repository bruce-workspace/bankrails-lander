<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BankRails — The Payment Layer for AI Agents</title>

  <!-- Open Graph -->
  <meta property="og:title" content="BankRails — The Payment Layer for AI Agents" />
  <meta property="og:description" content="AI Agents Can Think. Now They Can Pay. Join the waitlist." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bankrails.ai" />
  <meta property="og:image" content="https://bankrails.ai/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="BankRails — The Payment Layer for AI Agents" />
  <meta name="twitter:description" content="AI Agents Can Think. Now They Can Pay. Join the waitlist." />
  <meta name="twitter:image" content="https://bankrails.ai/og-image.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background-color: #0D0D0F;
      color: #F4F4F5;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      overflow-x: hidden;
      position: relative;
    }

    /* Radial purple glow */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(124,58,237,0.20) 0%, rgba(124,58,237,0.06) 45%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 28px;
      max-width: 600px;
      width: 100%;
    }

    /* ── Wordmark ── */
    .wordmark-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      color: #F4F4F5;
      line-height: 1;
    }

    /* Two thin rail lines below the wordmark */
    .rail-lines {
      display: block;
      width: 100%;
      height: 8px;
      margin-top: 5px;
      position: relative;
    }
    .rail-lines::before,
    .rail-lines::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: rgba(124, 58, 237, 0.60);
    }
    .rail-lines::before { top: 0; }
    .rail-lines::after  { top: 4px; }

    /* ── Headline ── */
    .headline {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: #F4F4F5;
    }

    /* ── Subhead ── */
    .subhead {
      font-size: 1.1rem;
      line-height: 1.65;
      color: #71717A;
      max-width: 480px;
    }

    /* ── Form ── */
    .form {
      display: flex;
      width: 100%;
      max-width: 480px;
    }

    .email-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.16);
      border-right: none;
      border-radius: 10px 0 0 10px;
      padding: 14px 18px;
      color: #F4F4F5;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .email-input::placeholder { color: #52525B; }
    .email-input:focus {
      border-color: rgba(124,58,237,0.55);
      background: rgba(124,58,237,0.06);
    }

    .submit-btn {
      flex-shrink: 0;
      background: #7C3AED;
      color: #fff;
      border: none;
      border-radius: 0 10px 10px 0;
      padding: 14px 22px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .submit-btn:hover {
      background: #6D28D9;
      box-shadow: 0 0 20px rgba(124,58,237,0.35);
    }
    .submit-btn:active { background: #5B21B6; }

    /* Success state */
    .success-msg {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: #10B981;
      padding: 14px 0;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Trust badge ── */
    .trust {
      font-size: 0.8rem;
      color: #52525B;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .trust a {
      color: #52525B;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.2s;
    }
    .trust a:hover { color: #A1A1AA; }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .form {
        flex-direction: column;
        gap: 10px;
      }
      .email-input {
        border-right: 1px solid rgba(255,255,255,0.16);
        border-radius: 10px;
        width: 100%;
      }
      .email-input:focus {
        border-color: rgba(124,58,237,0.55);
      }
      .submit-btn {
        border-radius: 10px;
        width: 100%;
        padding: 14px;
      }
    }
  </style>
</head>
<body>

  <main class="page">

    <!-- Wordmark -->
    <div class="wordmark-wrap">
      <span class="wordmark">bankrails</span>
      <span class="rail-lines" aria-hidden="true"></span>
    </div>

    <!-- Headline -->
    <h1 class="headline">AI Agents Can Think.<br />Now They Can Pay.</h1>

    <!-- Subhead -->
    <p class="subhead">The payment layer for autonomous AI workflows. Built on real banking rails, not crypto.</p>

    <!-- Waitlist form -->
    <!-- HUBSPOT_FORM_ID -->
    <form class="form" id="waitlist-form" novalidate onsubmit="handleSubmit(event)">
      <input
        class="email-input"
        type="email"
        name="email"
        placeholder="your@email.com"
        required
        autocomplete="email"
        aria-label="Email address"
      />
      <button class="submit-btn" type="submit">Join the Waitlist</button>
    </form>

    <!-- Trust badge -->
    <p class="trust">
      <span aria-hidden="true">🔒</span>
      Powered by <a href="https://www.getbankshot.com" target="_blank" rel="noopener noreferrer">Bank Shot</a>
    </p>

  </main>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const email = form.querySelector('input[type="email"]').value.trim();
      if (!email) return;

      // TODO: replace with HubSpot form submission
      // HubSpot portal ID + form ID: TBD (segment: bankrails-waitlist)
      console.log('[BankRails] waitlist signup:', email);

      const msg = document.createElement('p');
      msg.className = 'success-msg';
      msg.textContent = "You're on the list. We'll be in touch.";
      form.replaceWith(msg);
    }
  </script>

</body>
</html>
